name: Cynapx Autonomous Improvement Loop

# Runs roughly every 5 hours and continues the work plan in
# agent_docs/phaseN-plan.md: implements 1-2 items, runs tests, and pushes
# directly to the working branch. When the plan is exhausted it performs a
# fresh project diagnostic (incl. external research) and writes a new plan.
#
# Auth: uses a Claude Pro/Max subscription via OAuth token (not API billing).
# Required repo secret: CLAUDE_CODE_OAUTH_TOKEN
#   Generate locally with `claude setup-token` and add the value under
#   Settings > Secrets and variables > Actions.

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cynapx-autonomous-loop
  cancel-in-progress: false

jobs:
  continue-work:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: claude/latest-commit-query-9askn1
          persist-credentials: true

      - name: Configure git
        run: |
          git config --global user.email "claude-automation@users.noreply.github.com"
          git config --global user.name "Cynapx Autonomous Loop"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code autonomous cycle
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Repository: /home/user/Cynapx (current checkout), branch
            claude/latest-commit-query-9askn1. Perform exactly ONE cycle of
            the recurring improvement routine:

            1. Open the latest agent_docs/phaseN-plan.md and find the next
               incomplete item (not yet marked [DONE]).
            2. Implement that item (and at most one more if small): code
               changes + accompanying unit/regression tests.
            3. Run `npx tsc --noEmit` and `npm test`; both must pass before
               committing. If they fail, fix the issue or revert the change
               - never leave the branch in a red state.
            4. Mark the completed item(s) as [DONE] in the plan doc, and
               reflect the change in the relevant agent_docs/diagnostic-vN.md.
            5. Commit with a clear message and push to
               claude/latest-commit-query-9askn1 (no PR).
            6. If ALL items in the current plan are already [DONE]:
               a. Run a fresh full-project diagnostic covering architecture,
                  technical completeness, and optimization - including
                  external context (competing tools, recent architecture
                  trends, library CVEs) via web search.
               b. Write agent_docs/diagnostic-v(N+1).md and a new
                  agent_docs/phase(N+1)-plan.md sequencing the new findings.
               c. Commit and push both documents.

            Do not create a pull request. Keep the change set small and
            focused on a single plan item per run.
          claude_args: |
            --max-turns 60
            --model claude-sonnet-4-6
            --dangerously-skip-permissions
            --allowedTools "Bash" "Read" "Write" "Edit" "Glob" "Grep" "WebSearch" "WebFetch"
