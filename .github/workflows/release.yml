name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Create release archive
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ARCHIVE="cynapx-${TAG}.tar.gz"
          tar -czf "${ARCHIVE}" \
            dist/ \
            src/indexer/languages/queries/ \
            package.json \
            package-lock.json \
            README.md \
            CHANGELOG.md \
            LICENSE
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${TAG#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            > release_notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cynapx ${{ env.TAG }}"
          body_path: release_notes.md
          files: ${{ env.ARCHIVE }}
          draft: false
          prerelease: false
