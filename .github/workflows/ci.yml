name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # P13-1: Node 20 is EOL (2026-04-30); engines requires >=22
        node-version: [22, 24]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  lint:
    name: Lint (Node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      # P14-1 (N-1): supply-chain audit gate. Production deps only
      # (--omit=dev excludes vitest/vite transitive dev-only findings such as
      # postcss). Baseline after the fast-uri/qs overrides + express-rate-limit
      # 8.5.x bump is HIGH=0 and MODERATE=0. --audit-level=high fails the job on
      # any new HIGH/CRITICAL while tolerating dev-only moderates. See
      # agent_docs/diagnostic-v11.md (N-1) for reachability rationale and
      # upstream tracking (modelcontextprotocol/typescript-sdk#2042).
      - name: Audit production dependencies (HIGH gate)
        run: npm audit --omit=dev --audit-level=high

  build-native:
    name: Build Native (${{ matrix.platform }})
    needs: [build-and-test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-13
            platform: darwin-x64
          - os: macos-latest
            platform: darwin-arm64
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The server runs without native modules via the JS fallback path in the
      # native module loader. This step is best-effort until the NAPI-RS build
      # environment is fully provisioned on all runners.
      - name: Build native module
        run: npm run build:native
        continue-on-error: true
